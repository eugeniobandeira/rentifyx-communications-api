name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-test-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore RentifyxCommunications.slnx

      - name: Build
        run: dotnet build RentifyxCommunications.slnx --no-restore --configuration Release

      - name: Test
        run: >
          dotnet test RentifyxCommunications.slnx
          --no-build
          --configuration Release
          --filter "Category!=Integration"
          --logger "trx;LogFileName=test-results.trx"
          --results-directory ./TestResults
          --collect:"XPlat Code Coverage"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.*

      - name: Generate coverage report
        run: >
          reportgenerator
          -reports:./TestResults/**/coverage.cobertura.xml
          -targetdir:./TestResults/CoverageReport
          -reporttypes:"Html;JsonSummary"

      - name: Enforce 80% line coverage gate
        shell: bash
        run: |
          node -e "
            const coverage = require('./TestResults/CoverageReport/Summary.json').summary.linecoverage;
            console.log('Line coverage: ' + coverage + '%');
            if (coverage < 80) {
              console.log('::error::Line coverage ' + coverage + '% is below the required 80% threshold');
              process.exit(1);
            }
          "

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ./TestResults/CoverageReport

  trivy-scan:
    runs-on: ubuntu-latest
    needs: build-test-coverage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rentifyx-comms:${{ github.sha }} .

      # Pinned to a commit SHA, not a version tag: aquasecurity/trivy-action had
      # 76 of 77 tags retroactively repointed to a credential-stealing payload
      # in a March 2026 supply-chain attack. Tags are immutable again since the
      # incident, but SHA-pinning a security-scanning action is worth doing
      # regardless. Commit verified as the signed v0.36.0 release tag.
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: rentifyx-comms:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'

      - name: Upload Trivy scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
